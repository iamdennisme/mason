<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 钉钉风格背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3266FF"/>
      <stop offset="50%" style="stop-color:#4A75FF"/>
      <stop offset="100%" style="stop-color:#6389FF"/>
    </linearGradient>

    <!-- M 字母渐变：白色系 -->
    <linearGradient id="mGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E8EEFF"/>
    </linearGradient>

    <!-- 顶部微妙光泽 -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff" stop-opacity="0.2"/>
      <stop offset="50%" style="stop-color:#fff" stop-opacity="0.05"/>
      <stop offset="100%" style="stop-color:#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGradient)"/>

  <!-- 顶部光泽 -->
  <rect width="1024" height="380" rx="224" fill="url(#gloss)"/>

  <!-- M 字母 -->
  <g transform="translate(512, 512)">
    <rect x="-180" y="-160" width="80" height="320" rx="24" fill="url(#mGradient)"/>
    <rect x="100" y="-160" width="80" height="320" rx="24" fill="url(#mGradient)" opacity="0.85"/>

    <g opacity="0.92">
      <rect x="-100" y="-40" width="80" height="180" rx="20" fill="url(#mGradient)"
            transform="rotate(-25, -60, 50)"/>
      <rect x="20" y="-40" width="80" height="180" rx="20" fill="url(#mGradient)"
            transform="rotate(25, 60, 50)"/>
    </g>
  </g>
</svg>
